syntax = "proto3";

package wavespan.v1;

import "wavespan/v1/common.proto";

// KvService is the public key-value API (design/03_kv_store.md). Put/Get/Delete are eventually
// consistent; every response carries ResponseMeta so the consistency mode is never hidden.
service KvService {
  rpc Put(PutRequest) returns (PutResult);
  rpc Get(GetRequest) returns (GetResult);
  rpc Delete(DeleteRequest) returns (DeleteResult);
}

message PutRequest {
  string namespace = 1;
  bytes key = 2;
  bytes value = 3;
  optional int64 ttl_ms = 4;
  // idempotency_key: a retry with the same key collapses to one logical mutation.
  optional string idempotency_key = 5;
  // require_origin_plus_one defaults true; the write ACKs only after a nearby durable replica.
  bool require_origin_plus_one = 6;
}

message PutResult {
  ResponseMeta meta = 1;
  Version version = 2;
  uint32 acked_nearby_replicas = 3;
  bool geo_spillover = 4;
}

message GetRequest {
  string namespace = 1;
  bytes key = 2;
  bool allow_dynamic_cache = 3; // default true; cache path lands at M5
  bool hide_expired_on_read = 4;
}

message GetResult {
  ResponseMeta meta = 1;
  bool found = 2;
  bytes value = 3;
  optional int64 expires_at_unix_ms = 4;
}

message DeleteRequest {
  string namespace = 1;
  bytes key = 2;
  optional string idempotency_key = 3;
  bool require_origin_plus_one = 4;
}

message DeleteResult {
  ResponseMeta meta = 1;
  Version version = 2;
  uint32 acked_nearby_replicas = 3;
}

// ScanHeader is the first message of a range scan stream (design/03 "Range scans"). The Scan
// RPC and its body land at M6; the header is defined here so the wire shape is stable.
message ScanHeader {
  ResponseMeta meta = 1;
  Completeness completeness = 2;
}
