syntax = "proto3";

package wavespan.v1;

option go_package = "github.com/cwire/wavespan/proto/wavespan/v1;wavespanv1";

import "wavespan/v1/common.proto";
import "wavespan/v1/admin.proto";
import "wavespan/v1/cypher.proto";

// --- Live gossip observability (design/26, design/11) ---

// GossipKind classifies a gossip event.
enum GossipKind {
  GOSSIP_KIND_UNSPECIFIED = 0;
  GOSSIP_PING = 1;
  GOSSIP_ACK = 2;
  GOSSIP_INDIRECT = 3;
  GOSSIP_SUSPECT = 4;
  GOSSIP_ALIVE = 5;
  GOSSIP_UNREACHABLE = 6;
  GOSSIP_HOLDER_SUMMARY = 7;
  GOSSIP_LATENCY_EDGE = 8;
  GOSSIP_MEMBERSHIP_DELTA = 9;
}

// GossipDirection is the direction of a gossip event relative to this node.
enum GossipDirection {
  GOSSIP_DIRECTION_UNSPECIFIED = 0;
  GOSSIP_SEND = 1;
  GOSSIP_RECV = 2;
  GOSSIP_INTERNAL = 3; // a local state transition (no wire send)
}

// GossipFilter narrows the stream server-side (design/26).
message GossipFilter {
  repeated GossipKind kinds = 1;
  repeated string peers = 2;
  GossipDirection direction = 3;
  string namespace = 4;
}

// GossipPayloadSummary is the DECODED summary of a gossip payload — never raw record bytes
// (design/15 redaction).
message GossipPayloadSummary {
  double rtt_ms = 1;
  string new_state = 2;
  uint64 watermark = 3;
  uint64 approx_count = 4;
  double ewma_ms = 5;
  double p95_ms = 6;
  repeated string added_members = 7;
  repeated string removed_members = 8;
  uint32 payload_size_bytes = 9;
}

// GossipRecord is one observed gossip event.
message GossipRecord {
  GossipKind kind = 1;
  GossipDirection direction = 2;
  string peer = 3;
  int64 at_unix_ms = 4;
  uint64 seq = 5;
  GossipPayloadSummary summary = 6;
}

// GapMarker signals dropped events when a subscriber falls behind.
message GapMarker {
  uint64 dropped_count = 1;
  int64 since_unix_ms = 2;
}

// GossipEvent is a streamed record or a gap marker.
message GossipEvent {
  oneof event {
    GossipRecord record = 1;
    GapMarker gap = 2;
  }
}

message StreamGossipRequest {
  GossipFilter filter = 1;
  bool backfill = 2; // replay the matching ring buffer before tailing live
}

// --- Data inspection (design/26, design/11) ---

// Keyspace selects which logical keyspace to inspect.
enum Keyspace {
  KEYSPACE_UNSPECIFIED = 0;
  KEYSPACE_KV = 1;
  KEYSPACE_GRAPH = 2;
  KEYSPACE_VECTOR = 3;
}

// HolderClass classifies why a member holds a key.
enum HolderClass {
  HOLDER_CLASS_UNSPECIFIED = 0;
  HOLDER_ORIGIN = 1;
  HOLDER_DURABLE = 2;
  HOLDER_DYNAMIC_CACHE = 3;
}

message InspectHolder {
  string member_id = 1;
  HolderClass holder_class = 2;
  Version version = 3;
  ConflictState conflict = 4;
  int64 replication_lag_ms = 5;
  string peer_cluster_id = 6;
  int64 global_repl_lag_ms = 7;
}

message InspectSibling {
  Version version = 1;
  bool tombstone = 2;
  bytes value = 3; // redacted unless include_value + admin
}

message InspectKey {
  string logical_path = 1;
  string key_hash = 2; // base64url(blake3(namespace+key))
  Version version = 3;
  ConflictState conflict = 4;
  bool tombstone = 5;
  optional int64 expires_at_unix_ms = 6;
  bytes value = 7; // redacted unless include_value + admin
  repeated InspectSibling siblings = 8;
  repeated InspectHolder holders = 9;
}

message InspectTrailer {
  uint64 rows_returned = 1;
  Completeness final_completeness = 2;
  repeated string warnings = 3;
}

// InspectRow streams a header, then keys, then a trailer.
message InspectRow {
  oneof row {
    ResponseMeta header = 1;
    InspectKey key = 2;
    InspectTrailer trailer = 3;
  }
}

message InspectLocalRequest {
  Keyspace keyspace = 1;
  string namespace = 2;
  bytes prefix = 3;
  bytes start_key = 4;
  bytes end_key = 5;
  uint32 limit = 6;
  bool include_value = 7;
  // cluster_wide fans the scan out to every alive member of THIS cluster and merges by key (latest
  // version wins; the holders list shows which nodes hold each key). false = this node's store only.
  // Cross-CLUSTER resolution is InspectGlobal, not this flag.
  bool cluster_wide = 8;
}

message InspectGlobalRequest {
  Keyspace keyspace = 1;
  string namespace = 2;
  bytes key = 3;
  bool include_value = 4;
  bool include_peer_clusters = 5;
}

// --- Cluster view ---

message RangeRepairStatus {
  bytes range_start = 1;
  bytes range_end = 2;
  uint32 under_replicated = 3;
}

message GetClusterViewRequest {}

message GetClusterViewResponse {
  repeated MemberState members = 1;
  repeated LatencyEdge edges = 2;
  repeated RangeRepairStatus repair = 3;
  uint64 under_replicated_estimate = 4;
}

// --- Visual graph explorer (design/26 node explorer) ---

// GraphNode is a property-graph node for visualization. Property values are redacted unless the
// request includes include_value with an admin role.
message GraphNode {
  string node_id = 1;
  repeated string labels = 2;
  map<string, Value> properties = 3;
}

// GraphEdge is a directed relationship between two nodes.
message GraphEdge {
  string edge_id = 1;
  string source = 2;
  string target = 3;
  string type = 4;
}

message GraphExploreRequest {
  string graph_id = 1;
  string seed_node_id = 2; // optional; empty starts from the whole graph (bounded by limit)
  uint32 depth = 3;        // BFS hops from the seed (0 => just the seed / first page)
  uint32 limit = 4;        // max nodes returned (server-capped)
  bool include_value = 5;  // reveal property values (admin only)
}

message GraphExploreResponse {
  repeated GraphNode nodes = 1;
  repeated GraphEdge edges = 2;
  bool truncated = 3; // more nodes exist than the limit returned
}

// ObservabilityService powers the embedded node UI and wavespanctl introspection (design/26).
// Mounted on the admin port behind admin auth; values are redacted by default.
service ObservabilityService {
  rpc StreamGossip(StreamGossipRequest) returns (stream GossipEvent);
  rpc InspectLocal(InspectLocalRequest) returns (stream InspectRow);
  rpc InspectGlobal(InspectGlobalRequest) returns (stream InspectRow);
  rpc GetClusterView(GetClusterViewRequest) returns (GetClusterViewResponse);
  rpc GraphExplore(GraphExploreRequest) returns (GraphExploreResponse);
  // AdminPut writes a KV record for testing from the node UI, coordinated by a chosen cluster
  // member (target_member_id) so the operator can pick which node originates the write.
  rpc AdminPut(AdminPutRequest) returns (AdminPutResponse);
}

// AdminPutRequest is a test/admin KV write issued from the node UI (design/26). The write is
// forwarded to target_member_id's data port so that member becomes the write coordinator/origin;
// an empty target_member_id means the node serving this request coordinates.
message AdminPutRequest {
  string namespace = 1;
  bytes key = 2;
  bytes value = 3;
  optional int64 ttl_ms = 4;
  string target_member_id = 5;
}

// AdminPutResponse reports the outcome of an AdminPut, including which member coordinated it.
message AdminPutResponse {
  bool ok = 1;
  Version version = 2;
  uint32 acked_nearby_replicas = 3;
  string coordinator_member_id = 4;
  string error = 5;
}
