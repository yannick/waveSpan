apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wavespan-node
  labels:
    app.kubernetes.io/name: wavespan
    app.kubernetes.io/component: node
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: wavespan
      app.kubernetes.io/component: node
  # One pod per matching node; roll one node at a time so the cluster never loses quorum.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wavespan
        app.kubernetes.io/component: node
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7900"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: wavespan
      # --- run on ALL nodes of one node group, one instance each ---
      nodeSelector:
        # Replace with YOUR node-group label. Common cloud equivalents:
        #   EKS: eks.amazonaws.com/nodegroup: wavespan
        #   GKE: cloud.google.com/gke-nodepool: wavespan
        #   AKS: agentpool: wavespan
        wavespan.io/node-group: data
      tolerations:
        # Allow scheduling onto a DEDICATED, tainted node group.
        - key: wavespan.io/dedicated
          operator: Equal
          value: data
          effect: NoSchedule
      # Spread is implicit for a DaemonSet (1/node); keep pods off nodes outside the group via the
      # nodeSelector above.
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      # The scratch image has no shell; a tiny root initContainer prepares the node-local data dir.
      initContainers:
        - name: init-data-dir
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data && chown 65532:65532 /data && chmod 0700 /data"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: wavespan-node
          image: ghcr.io/cwire/wavespan-node:v0.1.0   # pinned via kustomization.yaml images:
          args: ["--config", "/etc/wavespan/config.yaml"]
          env:
            # Per-pod identity from the Downward API (overrides the shared config file).
            - name: WAVESPAN_MEMBER_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName     # unique per node (1 pod/node)
            - name: WAVESPAN_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: WAVESPAN_ADVERTISE_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP       # how peers reach this node
            # Go runtime tuning (design/27); GOMAXPROCS should match the pod's CPU limit.
            - name: GOGC
              value: "300"
            - name: GOMEMLIMIT
              value: "3GiB"
            - name: GOMAXPROCS
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
          ports:
            - name: gossip
              containerPort: 7700
              protocol: TCP
            - name: data
              containerPort: 7800
              protocol: TCP
            - name: admin
              containerPort: 7900
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 6Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/wavespan
              readOnly: true
            - name: tls
              mountPath: /etc/wavespan/tls
              readOnly: true
            - name: data
              mountPath: /var/lib/wavespan
      volumes:
        - name: config
          configMap:
            name: wavespan-config          # kustomize rewrites this to the hash-suffixed name
        - name: tls
          secret:
            secretName: wavespan-tls        # provided by cert-manager (see certificate.yaml)
        - name: data
          hostPath:
            path: /var/lib/wavespan         # node-local disk; one DB per node
            type: DirectoryOrCreate
