# Flux Kustomization: tells Flux to build + apply ./k8s (which runs kustomize, producing the
# hash-suffixed ConfigMap) and prune anything removed from Git. Lives in flux-system.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wavespan
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 1m
  timeout: 5m
  prune: true                 # delete resources removed from Git
  wait: true                  # block until the DaemonSet is healthy
  sourceRef:
    kind: GitRepository
    name: wavespan
  path: ./k8s                 # the kustomize overlay at <repo-root>/k8s
  targetNamespace: wavespan
  healthChecks:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: wavespan-node
      namespace: wavespan
