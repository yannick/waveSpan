# Profiling cluster: 3 nodes with pprof + block + mutex profiling enabled, for wavespan-profile.
# Uses the prebuilt-binary image (docker/Dockerfile.profile) so it reflects worktree code. target=1
# (the realistic dev config) so the breakdown reflects normal operation. Distinct project/ports so it
# does not clash with the dev/harness clusters.
#   GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o bin/wavespan-node.linux ./cmd/wavespan-node
#   docker build -f docker/Dockerfile.profile -t wavespan-node:profile .
name: wavespan-profile

x-node: &node
  image: wavespan-node:profile
  restart: unless-stopped

x-env: &env
  WAVESPAN_RUNTIME: docker
  WAVESPAN_CLUSTER_ID: profile
  WAVESPAN_SEEDS: node1:7700,node2:7700,node3:7700
  WAVESPAN_STORAGE_PATH: /var/lib/wavespan
  WAVESPAN_TARGET_NEARBY_REPLICAS: "1"
  WAVESPAN_VECTOR_INDEXES: "docs:docs:cosine:8"
  # profiling knobs (off in production): expose pprof + sample blocking & mutex contention
  WAVESPAN_PROFILING_ENABLED: "true"
  WAVESPAN_BLOCK_PROFILE_RATE: "10000"     # sample ~one blocking event per 10µs of delay
  WAVESPAN_MUTEX_PROFILE_FRACTION: "100"   # sample 1-in-100 contended mutex events
  # GC tuning (#10): with allocation cut ~3x, collect less often to spend more cycles serving
  # requests; GOMEMLIMIT caps heap as a safety net.
  GOGC: "300"
  GOMEMLIMIT: "3GiB"

services:
  node1:
    <<: *node
    environment:
      <<: *env
      WAVESPAN_MEMBER_ID: node1
      WAVESPAN_ZONE: zone-a
    ports: ["7921:7900", "7831:7800"]
  node2:
    <<: *node
    environment:
      <<: *env
      WAVESPAN_MEMBER_ID: node2
      WAVESPAN_ZONE: zone-a
    ports: ["7922:7900", "7832:7800"]
  node3:
    <<: *node
    environment:
      <<: *env
      WAVESPAN_MEMBER_ID: node3
      WAVESPAN_ZONE: zone-b
    ports: ["7923:7900", "7833:7800"]
