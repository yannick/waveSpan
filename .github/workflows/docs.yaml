# Build the standalone documentation site (ui/src/docs/content/*.md -> ./docs-site via Vite) and
# publish it to the gh-pages branch, which GitHub Pages serves at
# https://<owner>.github.io/<repo>/. This automates `make docs-deploy`; no manual step needed.
name: docs

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the docs site changes.
    paths:
      - "ui/**"
      - ".github/workflows/docs.yaml"
  workflow_dispatch: {}

# Serialize deploys; a newer push supersedes an in-flight one.
concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # peaceiris pushes the built site to the gh-pages branch
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      # Pure Node build (no Go / wavesdb / proto regen): bundles the committed markdown + UI into
      # ./docs-site. Uses the committed ui/src/gen client.
      - name: Build docs site
        working-directory: ui
        run: |
          npm ci
          npm run build:docs

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-site
          force_orphan: true # single-commit orphan history, matching scripts/deploy-docs-site.sh
