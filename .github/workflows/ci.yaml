# WaveSpan CI. Linux runners only; CI never uses Apple `container` (design/24). The same
# docker/Dockerfile that `make image` builds locally is built here multi-arch with buildx,
# and pushed to GHCR on pushes to main (build-only validation on pull requests).
name: ci

on:
  push:
    branches: [main]
  pull_request:

# One run per ref; a new push cancels the in-flight run for that ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # The data node depends on the sibling `wavesdb` module via `replace wavesdb => ../wavesdb`,
  # so CI checks out both repos as siblings. Defaults to <this owner>/wavesdb; override here if
  # the wavesdb module lives under a different owner/name.
  WAVESDB_REPO: ${{ github.repository_owner }}/wavesdb

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wavespan
        uses: actions/checkout@v4
        with:
          path: waveSpan

      - name: Checkout wavesdb (sibling module)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WAVESDB_REPO }}
          path: wavesdb

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: waveSpan/go.sum

      - name: Install buf + codegen plugins
        run: |
          go install github.com/bufbuild/buf/cmd/buf@latest
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Proto gate (regenerate, fail on drift)
        working-directory: waveSpan
        run: make proto-check

      - name: Lint
        working-directory: waveSpan
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b "$(go env GOPATH)/bin"
          make lint

      - name: Build
        working-directory: waveSpan
        run: make build

      - name: Unit tests
        working-directory: waveSpan
        run: make test

      - name: Race tests
        working-directory: waveSpan
        run: make test-race

  image:
    # Validate the container build on every PR; build AND push to GHCR on pushes to main.
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/wavespan-node
    steps:
      - name: Checkout wavespan
        uses: actions/checkout@v4
        with:
          path: waveSpan

      - name: Checkout wavesdb (sibling module)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WAVESDB_REPO }}
          path: wavesdb

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip on pull requests: forked PRs cannot access packages:write, and we don't push from PRs.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on main) the wavespan-node image, multi-arch
        # Context is the workspace root holding the waveSpan/ and wavesdb/ siblings the
        # Dockerfile COPYs; the build stage cross-compiles from $BUILDPLATFORM (CGO-free).
        uses: docker/build-push-action@v6
        with:
          context: .
          file: waveSpan/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
