# WaveSpan CI. Linux runners only; CI never uses Apple `container` (design/24). The same
# docker/Dockerfile that `make image` builds locally is built here multi-arch with buildx,
# and pushed to GHCR on pushes to main (build-only validation on pull requests).
name: ci

on:
  push:
    branches: [main]
  pull_request:

# One run per ref; a new push cancels the in-flight run for that ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # The data node depends on the sibling `wavesdb` module via `replace wavesdb => ../wavesdb`,
  # so CI checks out both repos as siblings. Defaults to <this owner>/wavesdb; override here if
  # the wavesdb module lives under a different owner/name.
  WAVESDB_REPO: ${{ github.repository_owner }}/wavesdb

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wavespan
        uses: actions/checkout@v4
        with:
          path: waveSpan

      - name: Checkout wavesdb (sibling module)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WAVESDB_REPO }}
          token: ${{ secrets.WAVESDB_TOKEN }}
          path: wavesdb

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: waveSpan/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: waveSpan/ui/package-lock.json

      - name: Install buf + codegen plugins
        # Pin to the exact versions the committed stubs were generated with, so the proto gate
        # (regenerate + fail on drift) is reproducible. protoc-gen-go must match the protobuf
        # runtime in go.mod (v1.36.11); protoc-gen-connect-go matches connectrpc.com/connect.
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.66.1
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.20.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # buf.gen.yaml also runs ui/node_modules/.bin/protoc-gen-es (browser stubs), so the UI deps
      # must be installed before `buf generate` runs in the proto gate.
      - name: Install UI deps (provides protoc-gen-es)
        working-directory: waveSpan/ui
        run: npm ci

      - name: Proto gate (regenerate, fail on drift)
        working-directory: waveSpan
        run: make proto-check

      # Build the real SPA into internal/ui/dist: the committed .gitkeep lets go:embed compile,
      # but internal/ui's server tests need a real index.html to serve. Runs after the proto gate
      # so the generated TS client (ui/src/gen) exists.
      - name: Build UI (embedded SPA)
        working-directory: waveSpan/ui
        run: npm run build

      - name: Lint
        # Official action: reliable pinned install (no flaky checksum), caching, respects
        # waveSpan/.golangci.yml (config version 2 → golangci-lint v2).
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: waveSpan

      - name: Build
        working-directory: waveSpan
        run: make build

      - name: Unit tests
        working-directory: waveSpan
        run: make test

      - name: Race tests
        working-directory: waveSpan
        run: make test-race

  image:
    # Validate the container build on every PR; build AND push to GHCR on pushes to main.
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/wavespan-node
    steps:
      - name: Checkout wavespan
        uses: actions/checkout@v4
        with:
          path: waveSpan

      - name: Checkout wavesdb (sibling module)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WAVESDB_REPO }}
          token: ${{ secrets.WAVESDB_TOKEN }}
          path: wavesdb

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip on pull requests: forked PRs cannot access packages:write, and we don't push from PRs.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on main) the wavespan-node image, multi-arch
        # Context is the workspace root holding the waveSpan/ and wavesdb/ siblings the
        # Dockerfile COPYs; the build stage cross-compiles from $BUILDPLATFORM (CGO-free).
        uses: docker/build-push-action@v6
        with:
          context: .
          file: waveSpan/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  benchui-image:
    # Validate the bench WebUI container build on every PR; build AND push to GHCR on pushes to main.
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/wavespan-benchui
    steps:
      - name: Checkout wavespan
        uses: actions/checkout@v4
        with:
          path: waveSpan

      - name: Checkout wavesdb (sibling module)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WAVESDB_REPO }}
          token: ${{ secrets.WAVESDB_TOKEN }}
          path: wavesdb

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip on pull requests: forked PRs cannot access packages:write, and we don't push from PRs.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on main) the wavespan-benchui image, multi-arch
        # Context is the workspace root holding the waveSpan/ and wavesdb/ siblings the
        # Dockerfile COPYs; the build stage cross-compiles from $BUILDPLATFORM (CGO-free).
        uses: docker/build-push-action@v6
        with:
          context: .
          file: waveSpan/docker/Dockerfile.benchui
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  binaries:
    # Cross-compile all cmd/* binaries (linux/darwin/windows) and upload them as downloadable
    # workflow artifacts. Retained per the repo's Actions artifact-retention setting.
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout wavespan
        uses: actions/checkout@v4
        with:
          path: waveSpan

      - name: Checkout wavesdb (sibling module)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WAVESDB_REPO }}
          token: ${{ secrets.WAVESDB_TOKEN }}
          path: wavesdb

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: waveSpan/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: waveSpan/ui/package-lock.json

      # cmd/wavespan-node embeds the node console SPA (internal/ui/dist) and cmd/wavespan-benchui
      # embeds the bench SPA (internal/benchui/dist), so build both real UIs before compiling. Uses
      # the committed ui/src/gen client (no proto regen needed here).
      - name: Build UI (embedded SPA)
        working-directory: waveSpan/ui
        run: npm ci && npm run build && npm run build:bench

      - name: Cross-compile all binaries
        working-directory: waveSpan
        env:
          VERSION: ${{ github.sha }}
        run: bash scripts/build-binaries.sh

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wavespan-binaries
          path: waveSpan/dist/*
          if-no-files-found: error

  sdk:
    # The Go SDK (sdk/go) is a self-contained module: it vendors its own generated stubs and depends
    # only on protobuf + Connect (never the server module or wavesdb), so it needs neither the
    # wavesdb sibling nor the UI. Verify its stubs are in sync with proto/, then build/vet/test/lint.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wavespan
        uses: actions/checkout@v4
        with:
          path: waveSpan

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: waveSpan/sdk/go/go.sum

      - name: Install buf + codegen plugins
        # Pinned to match the committed SDK stubs so the drift gate is reproducible (no protoc-gen-es:
        # the SDK is Go-only).
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.66.1
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.20.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: SDK proto gate (regenerate vendored stubs, fail on drift)
        working-directory: waveSpan
        run: |
          make sdk-proto
          git diff --exit-code sdk/go/internal/gen

      - name: SDK build + vet + test
        working-directory: waveSpan
        run: make sdk-test

      - name: SDK lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: waveSpan/sdk/go
