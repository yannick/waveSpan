version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  exclusions:
    paths:
      - 'proto/.*\.pb\.go$'
      - 'proto/.*connect/.*\.go$'
    rules:
      # `version` is an intentional, clear domain package name.
      - path: 'internal/version/'
        text: 'conflict with Go standard library'
        linters: [revive]
      # `parser` is the idiomatic name for the Cypher parser package.
      - path: 'internal/cypher/parser/'
        text: 'conflict with Go standard library'
        linters: [revive]
      # generated code
      - path: '\.pb\.go$'
        linters: [revive, staticcheck, misspell]
      # test helpers/cases sometimes legitimately ignore the *testing.T parameter.
      - path: '_test\.go$'
        text: 'parameter .t. seems to be unused'
        linters: [revive]
      # store implementations satisfy the fully-documented LocalStore interface;
      # per-method comments on the impls would be redundant.
      - path: 'internal/storage/.*_store\.go'
        text: 'exported method .* should have comment'
        linters: [revive]
